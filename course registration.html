<h2>Upload & Select</h2>
<form>
  <label>Upload sample programming:</label>
  <input type="file" name="programming"><br><br>

  <label>Course:</label>
  <select name="course">
    <optgroup label="Programming">
      <option>Java</option>
      <option>Python</option>
    </optgroup>
    <optgroup label="Web Development">
      <option>HTML</option>
      <option>CSS</option>
    </optgroup>
  </select><br><br>

  <button>Submit</button>
