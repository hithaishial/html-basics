<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Registration</title>
</head>
<body>
<form>
  <label for="participant">Participant Name:</label>
  <input type="text" id="participant" name="participant" required><br><br>

  <label for="event">Event Name:</label>
  <input type="text" id="event" name="event" required><br><br>

  <label for="date">Event Date:</label>
  <input type="date" id="date" name="date" required><br><br>

  <label for="tickets">Number of Tickets:</label>
  <input type="number" id="tickets" name="tickets" required><br><br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required><br><br>

  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" required><br><br>

  <button type="submit">Register</button>
</form>
</body>
</html>
