<!DOCTYPE html>
<html lang="en">
<head>
    <title>library membership</title>
</head>
<body>

    <form>
  <label for="memberName">Name:</label>
  <input type="text" id="memberName" name="memberName" required><br><br>

  <label for="dob">Date of Birth:</label>
  <input type="date" id="dob" name="dob" required><br><br>

  <label for="membershipId">Membership ID:</label>
  <input type="text" id="membershipId" name="membershipId" required><br><br>

  <label for="favBook">Favorite Book:</label>
  <input type="text" id="favBook" name="favBook"><br><br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required><br><br>

  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" required><br><br>

  <button type="submit">Join</button>
</form>

</body>
</html>
